<div class="roulette-overlay">
  <div class="roulette-modal">
    <span class="corner top-left"></span>
    <span class="corner top-right"></span>
    <span class="corner bot-left"></span>
    <span class="corner bot-right"></span>

    <div class="roulette-badge">🎲 ADQUISICIÓN TÁCTICA</div>
    <div class="roulette-player">Objetivo: <span class="player-name">{{ player() }}</span></div>

    <div class="roulette-window">
      <div class="window-scanline"></div>
      <div class="roulette-text pulse">{{ displaySkill() }}</div>
    </div>

    @if (skillDescription()) {
      <div class="roulette-desc">
        <span class="desc-icon">ℹ</span>
        {{ skillDescription() }}
      </div>
    }

    <div class="roulette-glow"></div>
  </div>
</div>
