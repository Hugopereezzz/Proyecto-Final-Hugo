<div class="gameover-overlay">
  <div class="gameover-card">
    <span class="corner top-left"></span>
    <span class="corner top-right"></span>
    <span class="corner bot-left"></span>
    <span class="corner bot-right"></span>

    <div class="go-badge">＞＿ COMBATE FINALIZADO</div>

    @if (winner()) {
      <h2 class="winner-title" [style.color]="winner()!.color">
        🏆 {{ winner()!.name }} HA DOMINADO 🏆
      </h2>
    } @else {
      <h2 class="winner-title draw">💀 ANIQUILACIÓN MUTUA 💀</h2>
    }

    <div class="reward-panel">
      <h3 class="reward-header">GANANCIAS DE COMBATE</h3>
      <div class="reward-rows">
        <div class="reward-row">
          <span>Bono de victoria</span>
          <span class="reward-val">+{{ winBonus() }} CC</span>
        </div>
        <div class="reward-row">
          <span>Botín de destrucción</span>
          <span class="reward-val">+{{ lootEarned() }} CC</span>
        </div>
      </div>
      <div class="reward-divider"></div>
      <div class="reward-total-row">
        <span>TOTAL GANADO</span>
        <span class="reward-total-val">{{ totalEarnings() }} CC</span>
      </div>
    </div>

    <button class="btn-back-lobby" (click)="playAgain.emit()">
      ← VOLVER AL INICIO
    </button>
  </div>
</div>
