@if (!isLoggedIn()) {
  <app-login (loginSuccess)="onLoginSuccess($event)"></app-login>
} @else {
  <div class="main-content">
    <!-- Solo cargamos el componente del Lobby tras el inicio de sesión -->
    <main>
      <app-lobby-principal [username]="currentUser()"></app-lobby-principal>
      <router-outlet></router-outlet>
    </main>
  </div>
}
