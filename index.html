<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 MissileWars — Multiplayer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050a14;
    --panel: rgba(10,20,40,0.92);
    --border: rgba(0,200,255,0.25);
    --glow: #00c8ff;
    --red: #ff4060;
    --gold: #ffd700;
    --green: #39ff14;
    --purple: #a855f7;
  }

  body {
    background: var(--bg);
    font-family: 'Exo 2', sans-serif;
    color: #e0f0ff;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ───── STARS ───── */
  #stars-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* ───── SCREENS ───── */
  .screen {
    position: fixed; inset: 0; display: flex;
    align-items: center; justify-content: center;
    z-index: 10; transition: opacity .4s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── LOBBY ── */
  #lobby {
    flex-direction: column;
    gap: 28px;
    padding: 20px;
  }
  .lobby-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 40px;
    width: min(700px, 96vw);
    box-shadow: 0 0 40px rgba(0,200,255,.12), 0 0 80px rgba(0,200,255,.05);
    backdrop-filter: blur(12px);
  }
  .lobby-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 900;
    text-align: center;
    color: var(--glow);
    text-shadow: 0 0 20px var(--glow);
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  .lobby-sub {
    text-align: center;
    color: rgba(180,220,255,.6);
    font-size: .9rem;
    margin-bottom: 28px;
  }
  .player-count-row {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    margin-bottom: 28px;
  }
  .player-count-row label {
    font-family: 'Orbitron', monospace; font-size: .8rem; letter-spacing: 1px;
    color: rgba(180,220,255,.7);
  }
  .count-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,200,255,.1); border: 1px solid var(--border);
    color: var(--glow); font-size: 1.3rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, box-shadow .2s;
  }
  .count-btn:hover { background: rgba(0,200,255,.25); box-shadow: 0 0 12px rgba(0,200,255,.4); }
  #count-display {
    font-family: 'Orbitron', monospace; font-size: 1.5rem;
    color: #fff; min-width: 36px; text-align: center;
  }

  .players-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    margin-bottom: 28px;
  }
  .player-slot {
    background: rgba(0,200,255,.04);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color .3s;
  }
  .player-slot.inactive { opacity: .3; pointer-events: none; }
  .slot-label {
    font-family: 'Orbitron', monospace; font-size: .7rem;
    letter-spacing: 2px;
  }
  .slot-label.p1 { color: #ff6b6b; }
  .slot-label.p2 { color: #4ecdc4; }
  .slot-label.p3 { color: #ffd700; }
  .slot-label.p4 { color: #a855f7; }

  .name-input {
    background: rgba(0,200,255,.06); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; color: #fff;
    font-family: 'Exo 2', sans-serif; font-size: .95rem;
    outline: none; transition: border-color .2s;
  }
  .name-input:focus { border-color: var(--glow); box-shadow: 0 0 8px rgba(0,200,255,.3); }

  .char-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .char-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(255,255,255,.05); border: 2px solid transparent;
    font-size: 1.3rem; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
  }
  .char-btn:hover { background: rgba(255,255,255,.12); transform: scale(1.1); }
  .char-btn.selected { border-color: var(--glow); background: rgba(0,200,255,.18); box-shadow: 0 0 10px rgba(0,200,255,.4); }

  .start-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #0077b6, #00c8ff);
    border: none; border-radius: 14px;
    font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 700;
    color: #fff; letter-spacing: 2px; cursor: pointer;
    box-shadow: 0 4px 30px rgba(0,200,255,.4);
    transition: transform .15s, box-shadow .15s;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(0,200,255,.6); }
  .start-btn:active { transform: translateY(0); }

  /* ── GAME ── */
  #game-screen {
    flex-direction: column; gap: 0;
    background: transparent;
  }
  #game-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 5;
  }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    background: rgba(5,10,20,.85);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
    gap: 10px;
    flex-wrap: wrap;
  }
  .hud-player {
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,200,255,.05); border: 1px solid var(--border);
    border-radius: 12px; padding: 6px 10px; min-width: 130px;
    transition: box-shadow .3s;
  }
  .hud-player.active {
    border-color: var(--gold);
    box-shadow: 0 0 16px rgba(255,215,0,.4);
  }
  .hud-player.dead { opacity: .3; }
  .hud-avatar { font-size: 1.4rem; }
  .hud-info { flex: 1; }
  .hud-name {
    font-family: 'Orbitron', monospace; font-size: .65rem;
    letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 80px;
  }
  .hp-bar-bg {
    width: 100%; height: 6px; border-radius: 3px;
    background: rgba(255,255,255,.1); margin-top: 4px; overflow: hidden;
  }
  .hp-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width .5s ease, background .5s;
  }
  .hud-turn {
    font-family: 'Orbitron', monospace; font-size: .7rem;
    color: var(--gold); letter-spacing: 2px; text-align: center;
    text-shadow: 0 0 10px rgba(255,215,0,.6);
  }

  /* Controls panel */
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    padding: 12px 24px;
    background: rgba(5,10,20,.92);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center; gap: 30px;
    flex-wrap: wrap;
  }
  .ctrl-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .ctrl-label {
    font-family: 'Orbitron', monospace; font-size: .55rem;
    letter-spacing: 2px; color: rgba(180,220,255,.5); text-transform: uppercase;
  }
  .ctrl-value {
    font-family: 'Orbitron', monospace; font-size: 1rem;
    color: var(--glow);
  }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 140px; height: 6px; border-radius: 3px;
    background: rgba(0,200,255,.15); outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--glow); box-shadow: 0 0 8px var(--glow); cursor: pointer;
  }
  .fire-btn {
    padding: 12px 36px;
    background: linear-gradient(135deg, #b91c1c, #ff4060);
    border: none; border-radius: 12px;
    font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 700;
    color: #fff; letter-spacing: 2px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,64,96,.5);
    transition: transform .15s, box-shadow .15s;
  }
  .fire-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,64,96,.7); }
  .fire-btn:active { transform: translateY(0); }
  .fire-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* ── WIN SCREEN ── */
  #win-screen {
    flex-direction: column; gap: 24px;
    z-index: 100;
  }
  #win-screen canvas {
    position: fixed; inset: 0; z-index: 99; pointer-events: none;
  }
  .win-card {
    background: rgba(5,10,20,.97);
    border: 1px solid rgba(255,215,0,.4);
    border-radius: 24px; padding: 48px 56px;
    text-align: center; z-index: 101;
    box-shadow: 0 0 60px rgba(255,215,0,.2);
    backdrop-filter: blur(20px);
  }
  .win-trophy { font-size: 5rem; margin-bottom: 12px; }
  .win-title {
    font-family: 'Orbitron', monospace; font-size: clamp(1.2rem,4vw,2rem);
    color: var(--gold); text-shadow: 0 0 20px var(--gold); letter-spacing: 3px;
  }
  .win-name {
    font-family: 'Orbitron', monospace; font-size: clamp(1.6rem,6vw,3rem);
    font-weight: 900; color: #fff; margin: 10px 0;
  }
  .win-avatar { font-size: 4rem; margin: 10px 0; }
  .play-again-btn {
    margin-top: 24px; padding: 14px 42px;
    background: linear-gradient(135deg, #0077b6, #00c8ff);
    border: none; border-radius: 14px;
    font-family: 'Orbitron', monospace; font-size: .9rem; font-weight: 700;
    color: #fff; letter-spacing: 2px; cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,200,255,.4);
    transition: transform .15s;
  }
  .play-again-btn:hover { transform: translateY(-2px); }

  /* Floating damage numbers */
  .dmg-float {
    position: fixed; font-family: 'Orbitron', monospace;
    font-weight: 900; font-size: 1.4rem; pointer-events: none;
    z-index: 50; color: var(--red);
    text-shadow: 0 0 12px var(--red);
    animation: floatUp 1.2s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-80px); }
  }

  /* Tooltip */
  #turn-toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(0,0,0,.85);
    border: 1px solid var(--gold);
    border-radius: 16px; padding: 20px 40px;
    font-family: 'Orbitron', monospace; font-size: 1.3rem;
    color: var(--gold); text-shadow: 0 0 12px var(--gold);
    z-index: 80; pointer-events: none;
    opacity: 0; transition: opacity .3s;
  }
  #turn-toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Animated starfield -->
<canvas id="stars-bg"></canvas>

<!-- ═══ LOBBY ═══ -->
<div class="screen" id="lobby">
  <div class="lobby-card">
    <div class="lobby-title">⚔ MISSILE WARS ⚔</div>
    <div class="lobby-sub">Selecciona jugadores y personajes para comenzar</div>

    <div class="player-count-row">
      <label>JUGADORES</label>
      <button class="count-btn" id="count-down">−</button>
      <span id="count-display">2</span>
      <button class="count-btn" id="count-up">+</button>
    </div>

    <div class="players-grid" id="players-grid"></div>

    <button class="start-btn" id="start-btn">🚀 INICIAR BATALLA</button>
  </div>
</div>

<!-- ═══ GAME ═══ -->
<div class="screen hidden" id="game-screen">
  <canvas id="game-canvas"></canvas>

  <div id="hud"></div>

  <div id="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Ángulo</span>
      <input type="range" id="angle-slider" min="0" max="360" value="45">
      <span class="ctrl-value" id="angle-val">45°</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Potencia</span>
      <input type="range" id="power-slider" min="10" max="100" value="60">
      <span class="ctrl-value" id="power-val">60%</span>
    </div>
    <button class="fire-btn" id="fire-btn">🔥 DISPARAR</button>
  </div>

  <div id="turn-toast"></div>
</div>

<!-- ═══ WIN ═══ -->
<div class="screen hidden" id="win-screen">
  <canvas id="confetti-canvas"></canvas>
  <div class="win-card">
    <div class="win-trophy">🏆</div>
    <div class="win-title">¡VICTORIA!</div>
    <div class="win-avatar" id="win-avatar"></div>
    <div class="win-name" id="win-name"></div>
    <button class="play-again-btn" id="play-again-btn">🔄 JUGAR DE NUEVO</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  STARFIELD
// ═══════════════════════════════════════════════════════
(function initStars() {
  const c = document.getElementById('stars-bg');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize() {
    c.width = innerWidth; c.height = innerHeight;
    stars = Array.from({ length: 200 }, () => ({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      r: Math.random() * 1.5 + .3,
      a: Math.random(),
      speed: Math.random() * .008 + .002
    }));
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    for (const s of stars) {
      s.a += s.speed;
      const alpha = .3 + .7 * Math.abs(Math.sin(s.a));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,230,255,${alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize(); draw();
})();

// ═══════════════════════════════════════════════════════
//  LOBBY
// ═══════════════════════════════════════════════════════
const CHARS = ['🤖','👾','🦊','🐉','💀','🧙','🐶','🦁','🐺','🦄','👻','🤡','🧟','🦸','🐸','🐱'];
const PLAYER_COLORS = ['#ff6b6b','#4ecdc4','#ffd700','#a855f7'];
const PLAYER_NAMES_DEF = ['Rojo','Cian','Dorado','Púrpura'];

let numPlayers = 2;
const playerSlots = [
  { name: 'Rojo', char: '🤖', charIdx: 0 },
  { name: 'Cian', char: '👾', charIdx: 1 },
  { name: 'Dorado', char: '🦊', charIdx: 2 },
  { name: 'Púrpura', char: '🐉', charIdx: 3 },
];

function buildLobby() {
  const grid = document.getElementById('players-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const slot = document.createElement('div');
    slot.className = 'player-slot' + (i >= numPlayers ? ' inactive' : '');
    slot.innerHTML = `
      <div class="slot-label p${i+1}">JUGADOR ${i+1}</div>
      <input class="name-input" id="name-${i}" placeholder="Nombre..." value="${playerSlots[i].name}" maxlength="12">
      <div class="char-row" id="char-row-${i}">
        ${CHARS.map((e,j) => `<button class="char-btn${playerSlots[i].charIdx===j?' selected':''}" data-p="${i}" data-ci="${j}">${e}</button>`).join('')}
      </div>`;
    grid.appendChild(slot);
  }
  // char select
  grid.querySelectorAll('.char-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = +btn.dataset.p, ci = +btn.dataset.ci;
      playerSlots[p].charIdx = ci;
      playerSlots[p].char = CHARS[ci];
      grid.querySelectorAll(`.char-btn[data-p="${p}"]`).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
  // name input
  grid.querySelectorAll('.name-input').forEach((inp, i) => {
    inp.addEventListener('input', () => { playerSlots[i].name = inp.value || PLAYER_NAMES_DEF[i]; });
  });
  document.getElementById('count-display').textContent = numPlayers;
}

document.getElementById('count-down').addEventListener('click', () => {
  if (numPlayers > 2) { numPlayers--; buildLobby(); }
});
document.getElementById('count-up').addEventListener('click', () => {
  if (numPlayers < 4) { numPlayers++; buildLobby(); }
});
buildLobby();

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('play-again-btn').addEventListener('click', () => {
  showScreen('lobby'); buildLobby();
  stopConfetti();
});

// ═══════════════════════════════════════════════════════
//  SCREEN SWITCHER
// ═══════════════════════════════════════════════════════
function showScreen(id) {
  ['lobby','game-screen','win-screen'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
const CVS = document.getElementById('game-canvas');
const CTX = CVS.getContext('2d');

let players = [];
let turnIdx = 0;
let missile = null;
let particles = [];
let animId = null;
let firing = false;

// Bases positions for up to 4 players (relative 0..1)
const BASE_POSITIONS = [
  { rx: 0.12, ry: 0.5 },  // LEFT
  { rx: 0.88, ry: 0.5 },  // RIGHT
  { rx: 0.5,  ry: 0.15 }, // TOP
  { rx: 0.5,  ry: 0.85 }, // BOTTOM
];

function resizeCanvas() {
  CVS.width  = innerWidth;
  CVS.height = innerHeight;
}

function startGame() {
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  players = playerSlots.slice(0, numPlayers).map((s, i) => ({
    id: i,
    name: s.name || PLAYER_NAMES_DEF[i],
    char: s.char || CHARS[i],
    color: PLAYER_COLORS[i],
    hp: 100,
    dead: false,
    rx: BASE_POSITIONS[i].rx,
    ry: BASE_POSITIONS[i].ry,
    get x() { return this.rx * CVS.width; },
    get y() { return this.ry * CVS.height; },
  }));

  turnIdx = 0;
  missile = null;
  particles = [];
  firing = false;

  buildHUD();
  showScreen('game-screen');
  setControls(true);
  showTurnToast();

  if (animId) cancelAnimationFrame(animId);
  loop();
}

// ─── HUD ───
function buildHUD() {
  const hud = document.getElementById('hud');
  hud.innerHTML = `<div></div>
    <div class="hud-turn" id="hud-turn">TURNO</div>
    <div></div>`;
  const left = hud.children[0];
  const right = hud.children[2];
  players.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'hud-player';
    el.id = `hud-p${i}`;
    el.innerHTML = `
      <span class="hud-avatar">${p.char}</span>
      <div class="hud-info">
        <div class="hud-name" style="color:${p.color}">${p.name}</div>
        <div class="hp-bar-bg"><div class="hp-bar-fill" id="hp-${i}" style="width:100%;background:${p.color}"></div></div>
      </div>`;
    if (i < 2) left.appendChild(el);
    else right.appendChild(el);
  });
  updateHUD();
}
function updateHUD() {
  players.forEach((p, i) => {
    const el = document.getElementById(`hud-p${i}`);
    if (!el) return;
    el.className = 'hud-player' + (i === turnIdx ? ' active' : '') + (p.dead ? ' dead' : '');
    const bar = document.getElementById(`hp-${i}`);
    if (bar) {
      const pct = Math.max(0, p.hp);
      bar.style.width = pct + '%';
      bar.style.background = pct > 50 ? p.color : pct > 25 ? '#f59e0b' : '#ef4444';
    }
  });
  const turnEl = document.getElementById('hud-turn');
  if (turnEl) {
    const cur = players[turnIdx];
    turnEl.textContent = `${cur.char} ${cur.name.toUpperCase()} — TURNO`;
  }
}

// ─── TURN TOAST ───
function showTurnToast() {
  const t = document.getElementById('turn-toast');
  const cur = players[turnIdx];
  t.textContent = `${cur.char}  TURNO DE ${cur.name.toUpperCase()}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── CONTROLS ───
const angleSlider = document.getElementById('angle-slider');
const powerSlider = document.getElementById('power-slider');
const angleVal    = document.getElementById('angle-val');
const powerVal    = document.getElementById('power-val');
const fireBtn     = document.getElementById('fire-btn');

angleSlider.addEventListener('input', () => { angleVal.textContent = angleSlider.value + '°'; });
powerSlider.addEventListener('input', () => { powerVal.textContent = powerSlider.value + '%'; });
fireBtn.addEventListener('click', fireMissile);

function setControls(enabled) {
  angleSlider.disabled = !enabled;
  powerSlider.disabled = !enabled;
  fireBtn.disabled = !enabled;
}

// ─── FIRE ───
function fireMissile() {
  if (firing) return;
  firing = true;
  setControls(false);

  const shooter = players[turnIdx];
  const angleDeg = +angleSlider.value;
  const power    = +powerSlider.value;
  const rad = angleDeg * Math.PI / 180;
  const speed = power * 0.09 + 2;

  missile = {
    x: shooter.x,
    y: shooter.y,
    vx: Math.cos(rad) * speed,
    vy: -Math.sin(rad) * speed,
    owner: shooter.id,
    trail: []
  };
}

// ─── PHYSICS ───
function stepMissile() {
  if (!missile) return;
  missile.trail.push({ x: missile.x, y: missile.y });
  if (missile.trail.length > 28) missile.trail.shift();

  missile.vy += 0.18; // gravity
  missile.x  += missile.vx;
  missile.y  += missile.vy;

  // Out of bounds
  if (missile.x < -60 || missile.x > CVS.width + 60 || missile.y > CVS.height + 60) {
    missile = null; firing = false; nextTurn(); return;
  }

  // Check collisions with other players
  for (const p of players) {
    if (p.dead || p.id === missile.owner) continue;
    const dx = missile.x - p.x, dy = missile.y - p.y;
    if (Math.sqrt(dx*dx + dy*dy) < 38) {
      explode(missile.x, missile.y, p.color);
      applyDamage(p, missile.x, missile.y);
      missile = null; return;
    }
  }
}

function applyDamage(target, ex, ey) {
  target.hp -= 30;
  showDmgFloat(ex, ey, '-30');
  // Splash to nearby
  for (const p of players) {
    if (p.dead || p.id === target.id) continue;
    const dx = ex - p.x, dy = ey - p.y;
    if (Math.sqrt(dx*dx + dy*dy) < 90) {
      p.hp -= 10;
      showDmgFloat(p.x, p.y - 30, '-10 💥');
    }
  }
  // Check deaths
  players.forEach(p => { if (p.hp <= 0 && !p.dead) { p.hp = 0; p.dead = true; } });
  updateHUD();

  const alive = players.filter(p => !p.dead);
  if (alive.length === 1) {
    setTimeout(() => endGame(alive[0]), 1000);
  } else {
    setTimeout(() => { firing = false; nextTurn(); }, 1200);
  }
}

function nextTurn() {
  let next = (turnIdx + 1) % players.length;
  let tries = 0;
  while (players[next].dead && tries < players.length) {
    next = (next + 1) % players.length;
    tries++;
  }
  turnIdx = next;
  updateHUD();
  showTurnToast();
  setControls(true);
}

// ─── EXPLOSION PARTICLES ───
function explode(x, y, color) {
  for (let i = 0; i < 60; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = Math.random() * 6 + 1;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      life: 1, decay: Math.random() * .03 + .02,
      r: Math.random() * 5 + 2,
      color: Math.random() > .4 ? color : '#fff',
      glow: Math.random() > .6
    });
  }
}

function stepParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += .12; p.vx *= .97;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─── FLOATING DAMAGE ───
function showDmgFloat(x, y, text) {
  const el = document.createElement('div');
  el.className = 'dmg-float';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

// ─── DRAW ───
function drawBase(p) {
  const x = p.x, y = p.y;
  const alive = !p.dead;
  const isActive = p.id === turnIdx && alive;

  CTX.save();

  // Platform
  CTX.shadowColor = isActive ? '#ffd700' : p.color;
  CTX.shadowBlur  = isActive ? 30 : 14;
  CTX.beginPath();
  CTX.roundRect(x - 34, y + 18, 68, 14, 7);
  CTX.fillStyle = p.dead ? '#333' : p.color;
  CTX.fill();

  // Antenna
  if (alive) {
    CTX.strokeStyle = p.color;
    CTX.lineWidth = 3;
    CTX.shadowBlur = 10;
    CTX.beginPath();
    CTX.moveTo(x, y + 18); CTX.lineTo(x, y); CTX.stroke();
    CTX.beginPath();
    CTX.arc(x, y, 5, 0, Math.PI * 2);
    CTX.fillStyle = '#fff';
    CTX.fill();
  }

  CTX.restore();

  // Avatar emoji
  CTX.font = p.dead ? '1.6rem sans-serif' : '2.2rem sans-serif';
  CTX.globalAlpha = p.dead ? .3 : 1;
  CTX.textAlign = 'center';
  CTX.textBaseline = 'bottom';
  CTX.fillText(p.char, x, y + 18);
  CTX.globalAlpha = 1;

  // Name
  CTX.font = '600 11px "Exo 2", sans-serif';
  CTX.fillStyle = p.dead ? '#555' : '#cce';
  CTX.textBaseline = 'top';
  CTX.fillText(p.dead ? '💀' : p.name, x, y + 36);

  // Aim arrow (active only)
  if (isActive && !firing) {
    const ang = +angleSlider.value * Math.PI / 180;
    const len = 55;
    const ax = x + Math.cos(ang) * len;
    const ay = y - Math.sin(ang) * len;
    CTX.save();
    CTX.strokeStyle = '#ffd700';
    CTX.lineWidth = 2;
    CTX.setLineDash([5, 4]);
    CTX.globalAlpha = .7;
    CTX.beginPath();
    CTX.moveTo(x, y); CTX.lineTo(ax, ay);
    CTX.stroke();
    // Arrowhead
    const headLen = 10, headAng = ang - Math.PI;
    CTX.globalAlpha = 1;
    CTX.setLineDash([]);
    CTX.beginPath();
    CTX.moveTo(ax, ay);
    CTX.lineTo(ax + Math.cos(headAng - .4) * headLen, ay - Math.sin(headAng - .4) * headLen);
    CTX.moveTo(ax, ay);
    CTX.lineTo(ax + Math.cos(headAng + .4) * headLen, ay - Math.sin(headAng + .4) * headLen);
    CTX.stroke();
    CTX.restore();
  }
}

function drawMissile() {
  if (!missile) return;
  // Trail
  for (let i = 0; i < missile.trail.length; i++) {
    const t = missile.trail[i];
    const alpha = (i / missile.trail.length) * .7;
    CTX.beginPath();
    CTX.arc(t.x, t.y, 3 * (i / missile.trail.length), 0, Math.PI * 2);
    CTX.fillStyle = `rgba(255,200,80,${alpha})`;
    CTX.fill();
  }
  // Head
  CTX.save();
  CTX.shadowColor = '#ff8800';
  CTX.shadowBlur = 18;
  CTX.beginPath();
  CTX.arc(missile.x, missile.y, 7, 0, Math.PI * 2);
  CTX.fillStyle = '#ff6600';
  CTX.fill();
  CTX.beginPath();
  CTX.arc(missile.x, missile.y, 4, 0, Math.PI * 2);
  CTX.fillStyle = '#fff8e1';
  CTX.fill();
  CTX.restore();
}

function drawParticles() {
  for (const p of particles) {
    CTX.save();
    if (p.glow) { CTX.shadowColor = p.color; CTX.shadowBlur = 12; }
    CTX.globalAlpha = p.life;
    CTX.beginPath();
    CTX.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    CTX.fillStyle = p.color;
    CTX.fill();
    CTX.restore();
  }
}

// ─── MAIN LOOP ───
function loop() {
  CTX.clearRect(0, 0, CVS.width, CVS.height);

  // Grid lines (subtle)
  CTX.save();
  CTX.strokeStyle = 'rgba(0,200,255,.04)';
  CTX.lineWidth = 1;
  for (let x = 0; x < CVS.width; x += 80) {
    CTX.beginPath(); CTX.moveTo(x,0); CTX.lineTo(x,CVS.height); CTX.stroke();
  }
  for (let y = 0; y < CVS.height; y += 80) {
    CTX.beginPath(); CTX.moveTo(0,y); CTX.lineTo(CVS.width,y); CTX.stroke();
  }
  CTX.restore();

  stepMissile();
  stepParticles();

  players.forEach(drawBase);
  drawMissile();
  drawParticles();

  animId = requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════
//  WIN
// ═══════════════════════════════════════════════════════
let confettiAnim = null;
function endGame(winner) {
  cancelAnimationFrame(animId);
  animId = null;
  document.getElementById('win-avatar').textContent = winner.char;
  document.getElementById('win-name').textContent = winner.name;
  showScreen('win-screen');
  startConfetti();
}

function startConfetti() {
  const cc = document.getElementById('confetti-canvas');
  cc.width = innerWidth; cc.height = innerHeight;
  const cctx = cc.getContext('2d');
  const pieces = Array.from({ length: 150 }, () => ({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight - innerHeight,
    w: Math.random() * 10 + 5,
    h: Math.random() * 6 + 3,
    color: ['#ff4060','#ffd700','#00c8ff','#a855f7','#39ff14'][Math.floor(Math.random()*5)],
    rot: Math.random() * Math.PI * 2,
    rSpeed: (Math.random() - .5) * .15,
    vy: Math.random() * 2 + 1.5,
    vx: (Math.random() - .5) * 1.5
  }));
  function draw() {
    cctx.clearRect(0, 0, cc.width, cc.height);
    for (const p of pieces) {
      p.y += p.vy; p.x += p.vx; p.rot += p.rSpeed;
      if (p.y > innerHeight + 20) { p.y = -20; p.x = Math.random() * innerWidth; }
      cctx.save();
      cctx.translate(p.x, p.y); cctx.rotate(p.rot);
      cctx.fillStyle = p.color;
      cctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      cctx.restore();
    }
    confettiAnim = requestAnimationFrame(draw);
  }
  draw();
}
function stopConfetti() {
  if (confettiAnim) { cancelAnimationFrame(confettiAnim); confettiAnim = null; }
  const cc = document.getElementById('confetti-canvas');
  cc.getContext('2d').clearRect(0, 0, cc.width, cc.height);
}
</script>
